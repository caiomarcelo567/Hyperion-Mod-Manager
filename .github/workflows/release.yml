name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: version
        shell: pwsh
        run: |
          $package = Get-Content package.json | Out-String | ConvertFrom-Json
          $version = $package.version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Check if release tag exists
        id: tag_check
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $tag = "v$version"
          git fetch --tags
          if (git tag -l $tag) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Create release tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $tag = "v$version"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag

      - name: Build installer
        if: steps.tag_check.outputs.exists == 'true'
        run: npm run dist

      - name: Build and publish
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:publish

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Hyperion-${{ steps.version.outputs.version }}
          path: dist/*.exe
          if-no-files-found: error

